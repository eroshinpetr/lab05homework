name: CMake CI

on:
  push:
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cxx: [g++, clang++]
    env:
      CXX: ${{ matrix.cxx }}
    steps:
      - uses: actions/checkout@v5
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --config Release
      - name: Test hello_world
        run: ./build/hello_world_application/hello_world
      - name: Test solver
        run: echo "1 5 6" | ./build/solver_application/solver

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64
      - name: Build
        run: cmake --build build --config Release
      - name: Test hello_world
        run: .\build\hello_world_application\Release\hello_world.exe
        shell: cmd
      - name: Test solver
        run: echo 1 5 6 | .\build\solver_application\Release\solver.exe
        shell: cmd
